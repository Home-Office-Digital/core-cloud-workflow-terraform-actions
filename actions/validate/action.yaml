name: "Terraform Validate"
description: "Checks Terraform syntax and consistency"

inputs:
  working-directory:
    description: "Directory of the Terraform code"
    required: false
    default: "."
  terraform-version:
    description: "Terraform version to use"
    required: false
    default: "~1.7.0"

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Terraform Init
      shell: bash
      run: |
        cd ${{ inputs.working-directory }}
        terraform init -backend=false

    - name: Terraform Validate
      shell: bash
      run: |
        cd ${{ inputs.working-directory }}
        terraform validate
