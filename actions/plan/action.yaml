name: "Terraform Plan"
description: "Run Terraform plan and bootstrap S3 bucket and DynamoDB if they don't exist"

inputs:
  account_id:
    description: "AWS Account ID"
    required: true
  aws-region:
    description: 'AWS Region for the State Bucket and Resources'
    default: eu-west-2
    required: false
    type: string
  github-environment:
    description: 'The name of your AWS environment. Create an environment secret called ACCOUNT_ID, also.'
    required: false
    default: 'placeholder'
    type: string
  role-to-assume:
    description: 'AWS Role name for OIDC'
    required: true
    type: string
  terraform-version:
    description: 'Terraform version to use'
    required: false
    default: '~1.7.0'
    type: string
  tf_secret_name:
    description: 'Terraform variable name to set via TF_VAR_ from AWS Secrets Manager'
    required: false
    default: ''
  tf_secret_id:
    description: 'AWS Secrets Manager secret ID to inject as TF_VAR_{tf_secret_name}'
    required: false
    default: ''
  tf_secret_2_name:
    description: 'Second Terraform variable name to set via TF_VAR_ from AWS Secrets Manager'
    required: false
    default: ''
  tf_secret_2_id:
    description: 'AWS Secrets Manager secret ID to inject as TF_VAR_{tf_secret_2_name}'
    required: false
    default: ''
  tf_secret_3_name:
    description: 'Third Terraform variable name to set via TF_VAR_ from AWS Secrets Manager'
    required: false
    default: ''
  tf_secret_3_id:
    description: 'AWS Secrets Manager secret ID to inject as TF_VAR_{tf_secret_3_name}'
    required: false
    default: ''
  tfvars-file:
    required: false
    type: string
    default: ''
  working-directory:
    description: 'Directory containing main.tf'
    required: false
    default: '.'
    type: string

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - uses: aws-actions/configure-aws-credentials@v4
      name: Configure AWS IdP Credentials
      with:
        aws-region: ${{ inputs.aws-region }}
        retry-max-attempts: 5
        role-session-name: GitHubActions
        role-to-assume: arn:aws:iam::${{ inputs.account_id }}:role/${{ inputs.role-to-assume }}

    - name: Inject Terraform variables from secrets
      shell: bash
      env:
        SECRET_PAIRS: |
          ${{ inputs.tf_secret_name }}|${{ inputs.tf_secret_id }}
          ${{ inputs.tf_secret_2_name }}|${{ inputs.tf_secret_2_id }}
          ${{ inputs.tf_secret_3_name }}|${{ inputs.tf_secret_3_id }}
      run: |
        while IFS='|' read -r var_name secret_id; do
          [ -z "$var_name" ] && continue
          SECRET_VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "$secret_id" \
            --query SecretString \
            --output text) || {
            echo "ERROR: Failed to retrieve secret '${secret_id}'" >&2
            exit 1
          }
          echo "::add-mask::${SECRET_VALUE}"
          echo "TF_VAR_${var_name}=${SECRET_VALUE}" >> $GITHUB_ENV
        done <<< "$SECRET_PAIRS"


    - name: Terraform Plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -n "${{ inputs.tfvars-file }}" ]; then
          terraform plan -input=false -var-file="${{ inputs.tfvars-file }}" -out=tfplan
        else
          terraform plan -input=false -out=tfplan
        fi

    - name: Upload Plan File
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-file-${{ inputs.github-environment }}
        path: |
          ${{ inputs.working-directory }}/tfplan
        retention-days: 1
