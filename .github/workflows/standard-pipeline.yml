name: Standard Terraform Pipeline

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory where terraform is initialised'
        required: false
        default: '.'
        type: string
      terraform-version:
        description: "Terraform version to use"
        required: false
        default: "~1.7.0"
        type: string

jobs:
  quality-checks:
    name: "Quality & Security"
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.quality-checks.outcome }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform Fmt
        id: quality-checks
        uses: UKHomeOffice/core-cloud-workflow-terraform-actions/actions/fmt@main
        with:
          working-directory: ${{ inputs.working-directory }}
        run: |
          terraform fmt -recursive -diff -check 2>&1 | tee fmt_diff.txt

          if [ -s fmt_diff.txt ]; then
            echo "issues_found=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "issues_found=false" >> $GITHUB_OUTPUT
          fi

      # Generate summary for PR/Actions UI
      - name: Generate fmt Diff Summary
        if: always()
        shell: bash
        run: |
          echo "## Terraform FMT Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.fmt-scan.outcome }}" == "success" ]; then
            echo "✅ **Status:** Passed - No formatting issues detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Failed - Formatting issues detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Click to expand diff</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            cat ${{ inputs.working_directory }}/fmt_diff.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- Working Directory: \`${{ inputs.working_directory }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Terraform Version: \`${{ inputs.terraform_version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Terraform Validate
        uses: UKHomeOffice/core-cloud-workflow-terraform-actions/actions/validate@main
        with:
          working-directory: ${{ inputs.working-directory }}
          terraform-version: ${{ inputs.terraform-version }}

# TODO: TFLint is not part of the official terraform CLI and is more complex. Suggest keeping that in separate repo and pointing to it here, with the ability to disable
